# ~/.config/kitty/kitty.conf

# Environment
term xterm-256color

# Window
window_padding_width 10
background_opacity 0.9
# blur (Linux/Wayland only - may need compositor support)
background_blur 1
hide_window_decorations yes
confirm_os_window_close 0

# Mouse
mouse_hide_wait 3.0

# Scrolling
scrollback_lines 10000
wheel_scroll_multiplier 3.0

# Font
font_family      JetBrains Mono Nerd Font
bold_font        JetBrains Mono Nerd Font Bold
italic_font      JetBrains Mono Nerd Font Italic
bold_italic_font JetBrains Mono Nerd Font Bold Italic
font_size        12.0

# Cursor
cursor_shape               block
cursor_blink_interval      0.75
cursor_stop_blinking_after 0

# Bell
visual_bell_duration 0.0
bell_on_tab          no

# Catppuccin Mocha Colors

# Primary
background #11111B
foreground #CDD6F4

# Cursor
cursor      #F5E0DC
cursor_text_color #11111B

# Selection
selection_background #F5E0DC
selection_foreground #11111B

# Normal colors
color0  #45475A
color1  #F38BA8
color2  #A6E3A1
color3  #F9E2AF
color4  #89B4FA
color5  #F5C2E7
color6  #94E2D5
color7  #BAC2DE

# Bright colors
color8  #585B70
color9  #F38BA8
color10 #A6E3A1
color11 #F9E2AF
color12 #89B4FA
color13 #F5C2E7
color14 #94E2D5
color15 #A6ADC8

# URL detection
detect_urls yes

# Key bindings
map ctrl+shift+v paste_from_clipboard
map ctrl+shift+c copy_to_clipboard
map ctrl+0       change_font_size all 0
map ctrl+equal   change_font_size all +1.0
map ctrl+plus    change_font_size all +1.0
map ctrl+minus   change_font_size all -1.0
map ctrl+shift+n new_os_window
