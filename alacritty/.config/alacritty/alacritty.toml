# Alacritty Configuration
[env]
TERM = "xterm-256color"

[window]
padding.x = 10
padding.y = 10
dynamic_padding = false
opacity = 0.9
blur = true
decorations = "None"

[mouse]
hide_when_typing = true

[scrolling]
history = 10000
multiplier = 3

[font]
size = 12.0

[font.normal]
family = "JetBrains Mono Nerd Font"
style = "Regular"

[font.bold]
family = "JetBrains Mono Nerd Font"
style = "Bold"

[font.italic]
family = "JetBrains Mono Nerd Font"
style = "Italic"

[font.bold_italic]
family = "JetBrains Mono Nerd Font"
style = "Bold Italic"

[cursor]
unfocused_hollow = true
blink_interval = 750

[cursor.style]
shape = "Block"
blinking = "On"

[bell]
animation = "EaseOutExpo"
duration = 0
color = "#EBA0AC"

# Catppuccin Mocha Colors
[colors.primary]
# OPTION 1: Darker background (easier on eyes) - CURRENTLY ACTIVE
background = '#11111B' # crust (darkest)
# OPTION 2: Lighter background (more contrast) - COMMENTED OUT
# background = '#1E1E2E' # base

foreground = '#CDD6F4' # text
# Bright and dim foreground colors
dim_foreground = '#CDD6F4' # text
bright_foreground = '#CDD6F4' # text

# Cursor colors
[colors.cursor]
# Match the background option you chose above
text = '#11111B' # crust (change to '#1E1E2E' if using lighter bg)
cursor = '#F5E0DC' # rosewater

[colors.vi_mode_cursor]
text = '#11111B' # crust (change to '#1E1E2E' if using lighter bg)
cursor = '#B4BEFE' # lavender

# Search colors
[colors.search.matches]
foreground = '#11111B' # crust (change to '#1E1E2E' if using lighter bg)
background = '#A6ADC8' # subtext0

[colors.search.focused_match]
foreground = '#11111B' # crust (change to '#1E1E2E' if using lighter bg)
background = '#A6E3A1' # green

[colors.footer_bar]
foreground = '#11111B' # crust (change to '#1E1E2E' if using lighter bg)
background = '#A6ADC8' # subtext0

# Keyboard regex hints
[colors.hints.start]
foreground = '#11111B' # crust (change to '#1E1E2E' if using lighter bg)
background = '#F9E2AF' # yellow

[colors.hints.end]
foreground = '#11111B' # crust (change to '#1E1E2E' if using lighter bg)
background = '#A6ADC8' # subtext0

# Selection colors
[colors.selection]
text = '#11111B' # crust (change to '#1E1E2E' if using lighter bg)
background = '#F5E0DC' # rosewater

# Normal colors
[colors.normal]
black = '#45475A' # surface1
red = '#F38BA8' # red
green = '#A6E3A1' # green
yellow = '#F9E2AF' # yellow
blue = '#89B4FA' # blue
magenta = '#F5C2E7' # pink
cyan = '#94E2D5' # teal
white = '#BAC2DE' # subtext1

# Bright colors
[colors.bright]
black = '#585B70' # surface2
red = '#F38BA8' # red
green = '#A6E3A1' # green
yellow = '#F9E2AF' # yellow
blue = '#89B4FA' # blue
magenta = '#F5C2E7' # pink
cyan = '#94E2D5' # teal
white = '#A6ADC8' # subtext0

# Dim colors
[colors.dim]
black = '#45475A' # surface1
red = '#F38BA8' # red
green = '#A6E3A1' # green
yellow = '#F9E2AF' # yellow
blue = '#89B4FA' # blue
magenta = '#F5C2E7' # pink
cyan = '#94E2D5' # teal
white = '#BAC2DE' # subtext1


# Key bindings
[[keyboard.bindings]]
key = "V"
mods = "Control|Shift"
action = "Paste"

[[keyboard.bindings]]
key = "C"
mods = "Control|Shift"
action = "Copy"

[[keyboard.bindings]]
key = "Key0"
mods = "Control"
action = "ResetFontSize"

[[keyboard.bindings]]
key = "Equals"
mods = "Control"
action = "IncreaseFontSize"

[[keyboard.bindings]]
key = "Plus"
mods = "Control"
action = "IncreaseFontSize"

[[keyboard.bindings]]
key = "Minus"
mods = "Control"
action = "DecreaseFontSize"

[[keyboard.bindings]]
key = "N"
mods = "Control|Shift"
action = "SpawnNewInstance"
