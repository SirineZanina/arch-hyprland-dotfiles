###################
### KEYBINDINGS ###
###################
# See https://wiki.hypr.land/Configuring/Keywords/
$mainMod = SUPER # Sets "Windows" key as main modifier

# ==========================================
# CORE APPLICATION BINDS
# ==========================================
bind = $mainMod, Return, exec, $terminal
bind = $mainMod, E, exec, $fileManager
bind = $mainMod, space, exec, ~/.config/rofi/launcher/launcher.sh

# ==========================================
# WINDOW MANAGEMENT
# ==========================================
# Basic window controls
bind = $mainMod, W, killactive
bind = $mainMod, V, togglefloating
bind = $mainMod, F, fullscreen, 0
bind = $mainMod SHIFT, F, fullscreen, 1       # Maximize (keep gaps)
bind = $mainMod, P, pseudo                    # dwindle
bind = $mainMod, J, togglesplit               # dwindle

bind = $mainMod, T, exec, hyprctl dispatch togglefloating && hyprctl dispatch resizeactive exact 50% 60% && hyprctl dispatch centerwindow

# Focus movement (vim-style)
bind = $mainMod, h, movefocus, l
bind = $mainMod, j, movefocus, d
bind = $mainMod, k, movefocus, u
bind = $mainMod, l, movefocus, r

# Move windows (SHIFT + movement keys)
bind = $mainMod SHIFT, h, movewindow, l
bind = $mainMod SHIFT, j, movewindow, d
bind = $mainMod SHIFT, k, movewindow, u
bind = $mainMod SHIFT, l, movewindow, r 

# Resize window - use hjkl or arrows
binde = $mainMod CTRL, h, resizeactive, -50 0
binde = $mainMod CTRL, l, resizeactive, 50 0
binde = $mainMod CTRL, k, resizeactive, 0 -50
binde = $mainMod CTRL, j, resizeactive, 0 50

binde = $mainMod CTRL, Left, resizeactive, -50 0
binde = $mainMod CTRL, Right, resizeactive, 50 0
binde = $mainMod CTRL, Up, resizeactive, 0 -50
binde = $mainMod CTRL, Down, resizeactive, 0 50

# ==========================================
# WORKSPACE MANAGEMENT
# ==========================================
# Switch workspaces
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9

# Move windows to workspaces
bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9

bind = $mainMod CTRL SHIFT, 1, movetoworkspacesilent, 1
bind = $mainMod CTRL SHIFT, 2, movetoworkspacesilent, 2
bind = $mainMod CTRL SHIFT, 3, movetoworkspacesilent, 3
bind = $mainMod CTRL SHIFT, 4, movetoworkspacesilent, 4
bind = $mainMod CTRL SHIFT, 5, movetoworkspacesilent, 5
bind = $mainMod CTRL SHIFT, 6, movetoworkspacesilent, 6
bind = $mainMod CTRL SHIFT, 7, movetoworkspacesilent, 7
bind = $mainMod CTRL SHIFT, 8, movetoworkspacesilent, 8
bind = $mainMod CTRL SHIFT, 9, movetoworkspacesilent, 9


# Workspace navigation
bind = $mainMod, TAB, workspace, previous
bind = $mainMod, mouse_down, workspace, e+1
bind = $mainMod, mouse_up, workspace, e-1

# ==========================================
# SYSTEM CONTROLS
# ==========================================
# Session management
bind = $mainMod, M, exit # Exit Hyprland
bind = $mainMod, F12, exec, hyprlock

# Wlogout	
# bind = $mainMod, Escape, exec, wlogout --protocol layer-shell
bind = $mainMod, Escape, exec, ~/.config/rofi/powermenu/powermenu.sh

# System bar/UI
bind = $mainMod, R, exec, ~/.config/waybar/scripts/launch.sh

# Display Menu
bind = $mainMod, D, exec, ~/.config/rofi/displaymenu/displaymenu.sh

# Open Browser
bind = $mainMod, B, exec, $browser

# ==========================================
# MEDIA & HARDWARE
# ==========================================

# Volume and Media Control
# Volume control with wpctl
binde = , XF86AudioRaiseVolume, exec, wpctl set-volume -l 1.0 @DEFAULT_AUDIO_SINK@ 5%+
binde = , XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bind = , XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle

# Brightness control
bind = , XF86MonBrightnessUp, exec, brightnessctl set 5%+
bind = , XF86MonBrightnessDown, exec, brightnessctl set 5%-

# ==========================================
# UTILITIES & TOOLS
# ==========================================

# Screenshots
bind = , PRINT, exec, hyprshot -m output -o ~/Pictures/Screenshots
bind = SHIFT, PRINT, exec, hyprshot -m region -o ~/Pictures/Screenshots
bind = ALT, PRINT, exec, hyprshot -m window -o ~/Pictures/Screenshots

# Color picker
bind = $mainMod, C, exec, hyprpicker -a

# Clipboard history
bind = $mainMod SHIFT, V, exec, ~/.config/rofi/clipboard/clipboard.sh

# ==========================================
# MOUSE BINDS
# ==========================================
# Move/resize windows with mainMod + LMB/RMB and dragging
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow
