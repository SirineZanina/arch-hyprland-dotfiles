# exec-once = hyprpm
# exec-once = hyprpm reload -n

# exec-once = swww-daemon
exec-once = systemctl --user start hyprpolkitagent
exec-once = dbus-update-activation-environment --systemd WAYLAND_DISPLAY XDG_CURRENT_DESKTOP
exec-once = wl-paste --type text --watch cliphist store
exec-once = wl-paste --type image --watch cliphist store
# exec-once = hyprpaper
exec-once = awww-daemon & awww img ~/.config/wallpapers/sunken-tower.png
exec-once = waybar
exec-once = blueman-applet
exec-once = nm-applet --indicator
exec-once = /usr/bin/hypridle

exec-once = protonvpn-app

# GTK theme settings (ensures all GTK apps respect theme)
exec-once = gsettings set org.gnome.desktop.interface gtk-theme "catppuccin-mocha-blue-standard+default"
exec-once = gsettings set org.gnome.desktop.interface color-scheme "prefer-dark"
